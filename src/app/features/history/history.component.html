<ActionBar title="Prayer Streaks"></ActionBar>

<GridLayout rows="auto, auto, auto, *">
  <!-- Stats bar -->
  <GridLayout row="0" columns="*, *" class="p-4 mx-4 mt-5 mb-3 rounded-2xl bg-white dark:bg-[#1c1c1e]">
    <StackLayout col="0" class="text-center p-2">
      <Label
        [text]="checkinService.currentStreak()"
        class="text-center text-3xl font-bold text-orange-500"
      ></Label>
      <Label
        text="Current"
        class="text-center text-sm text-gray-500 dark:text-gray-400"
      ></Label>
    </StackLayout>
    <StackLayout col="1" class="text-center p-2">
      <Label
        [text]="checkinService.longestStreak()"
        class="text-center text-3xl font-bold text-blue-500"
      ></Label>
      <Label
        text="Longest"
        class="text-center text-sm text-gray-500 dark:text-gray-400"
      ></Label>
    </StackLayout>
  </GridLayout>

  <!-- View toggle -->
  <GridLayout row="1" columns="*, *, *" class="mx-4 mb-3 p-1 rounded-xl bg-white dark:bg-[#1c1c1e]">
    <Label col="0" text="Year"
      class="text-center text-sm font-semibold py-2 rounded-lg"
      [color]="viewMode() === 'year' ? '#ffffff' : '#6b7280'"
      [backgroundColor]="viewMode() === 'year' ? '#3b82f6' : 'transparent'"
      (tap)="setViewMode('year')"
    ></Label>
    <Label col="1" text="Calendar"
      class="text-center text-sm font-semibold py-2 rounded-lg"
      [color]="viewMode() === 'calendar' ? '#ffffff' : '#6b7280'"
      [backgroundColor]="viewMode() === 'calendar' ? '#3b82f6' : 'transparent'"
      (tap)="setViewMode('calendar')"
    ></Label>
    <Label col="2" text="List"
      class="text-center text-sm font-semibold py-2 rounded-lg"
      [color]="viewMode() === 'list' ? '#ffffff' : '#6b7280'"
      [backgroundColor]="viewMode() === 'list' ? '#3b82f6' : 'transparent'"
      (tap)="setViewMode('list')"
    ></Label>
  </GridLayout>

  <!-- =============== LIST VIEW =============== -->
  @if (viewMode() === 'list') {
    <StackLayout row="2">
      <!-- Search bar -->
      <GridLayout columns="auto, *, auto" class="mx-4 mb-3 px-3 py-2 rounded-xl bg-white dark:bg-[#1c1c1e]">
        <Image
          *ngIf="isIOS"
          col="0"
          src="sys://magnifyingglass"
          tintColor="#9ca3af"
          width="18" height="18"
          verticalAlignment="center"
        ></Image>
        <Label
          *ngIf="!isIOS"
          col="0"
          [text]="searchIcon"
          class="material-icon text-gray-400"
          style="font-size: 18"
          verticalAlignment="center"
        ></Label>
        <TextField
          col="1"
          [text]="searchQuery()"
          (textChange)="onSearchInput($event.value)"
          hint="Search journal entries..."
          class="text-sm ml-2 text-gray-800 dark:text-gray-200"
          returnKeyType="search"
        ></TextField>
        @if (searchQuery()) {
          <Label
            col="2"
            text="Clear"
            class="text-sm text-blue-500 font-medium"
            verticalAlignment="center"
            (tap)="clearSearch()"
          ></Label>
        } @else if (hasJournalEntries()) {
          <GridLayout col="2" (tap)="onExportJournal()">
            <Image
              *ngIf="isIOS"
              src="sys://square.and.arrow.up"
              tintColor="#3b82f6"
              width="18" height="18"
              verticalAlignment="center"
            ></Image>
            <Label
              *ngIf="!isIOS"
              [text]="exportIcon"
              class="material-icon text-blue-500"
              style="font-size: 18"
              verticalAlignment="center"
            ></Label>
          </GridLayout>
        }
      </GridLayout>
      <Label text="Last 30 Days" class="text-2xl font-bold ml-4 mb-2 dark:text-white"></Label>
    </StackLayout>

    <!-- History list -->
    <ListView
      row="3"
      [items]="historyItems()"
      separatorColor="transparent"
      class="mx-4 rounded-2xl bg-white dark:bg-[#1c1c1e]"
    >
      <ng-template let-item="item">
        <StackLayout>
          <Label
            *ngIf="item.isMonthHeader"
            [text]="item.monthYear"
            class="text-sm font-bold text-gray-400 dark:text-gray-500 p-2 px-4 mt-2 uppercase"
          ></Label>
          <StackLayout *ngIf="!item.isMonthHeader" (tap)="item.note ? toggleExpand(item.date) : null">
            <GridLayout
              columns="auto, auto, *, auto, auto"
              class="py-3 px-4 border-b border-gray-100 dark:border-gray-700"
            >
              <Image
                *ngIf="isIOS"
                col="0"
                [src]="item.shielded ? 'sys://shield.fill' : item.checked ? 'sys://checkmark.circle.fill' : 'sys://xmark'"
                [tintColor]="item.shielded ? '#8b5cf6' : item.checked ? '#22c55e' : '#ef4444'"
                width="20" height="20"
              ></Image>
              <Label
                *ngIf="!isIOS"
                col="0"
                [text]="item.shielded ? shieldIcon : item.checked ? checkIcon : closeIcon"
                class="material-icon"
                style="font-size: 20"
                [class.text-green-500]="item.checked && !item.shielded"
                [class.text-red-500]="!item.checked && !item.shielded"
                [class.text-purple-500]="item.shielded"
                width="24"
              ></Label>
              <Label
                col="1"
                [text]="item.displayDate"
                class="text-base ml-3 dark:text-gray-200"
                [class.text-gray-800]="item.checked"
                [class.text-gray-400]="!item.checked"
              ></Label>
              <Label col="2" text=""></Label>
              <Label
                *ngIf="item.prayerType"
                col="3"
                [text]="item.prayerType"
                class="text-xs text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-700 rounded-full px-2 py-1"
              ></Label>
              <StackLayout *ngIf="item.note" col="4" class="ml-2" verticalAlignment="center">
                <Image
                  *ngIf="isIOS"
                  [src]="item.isExpanded ? 'sys://chevron.up' : 'sys://text.bubble'"
                  tintColor="#9ca3af"
                  width="16" height="16"
                ></Image>
                <Label
                  *ngIf="!isIOS"
                  [text]="item.isExpanded ? collapseIcon : noteIcon"
                  class="material-icon text-gray-400"
                  style="font-size: 16"
                ></Label>
              </StackLayout>
            </GridLayout>
            <!-- Slot badges -->
            <WrapLayout *ngIf="item.slots && item.slots.length > 0" class="px-4 pt-1 pb-2 ml-8">
              <Label *ngFor="let sl of item.slots"
                [text]="sl.name"
                [class]="
                  'mr-1 mb-1 py-1 px-2 rounded text-xs font-medium ' +
                  (sl.done
                    ? 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300'
                    : 'bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500')
                "
              ></Label>
            </WrapLayout>
            <StackLayout *ngIf="item.isExpanded && item.note" class="px-4 pb-3 pt-1 ml-8">
              <Label
                [text]="item.note"
                textWrap="true"
                class="text-sm text-gray-600 dark:text-gray-300 leading-5 p-3 rounded-lg bg-gray-50 dark:bg-[#2c2c2e]"
              ></Label>
            </StackLayout>
          </StackLayout>
        </StackLayout>
      </ng-template>
    </ListView>
  }

  <!-- =============== CALENDAR VIEW =============== -->
  @else if (viewMode() === 'calendar') {
    <!-- Month navigation -->
    <GridLayout row="2" columns="auto, *, auto" class="mx-4 mb-2 px-2">
      <StackLayout col="0" (tap)="previousMonth()" class="p-2">
        <Image
          *ngIf="isIOS"
          src="sys://chevron.left"
          tintColor="#3b82f6"
          width="22" height="22"
        ></Image>
        <Label
          *ngIf="!isIOS"
          [text]="prevIcon"
          class="material-icon text-blue-500"
          style="font-size: 22"
        ></Label>
      </StackLayout>
      <Label col="1"
        [text]="currentMonthLabel()"
        class="text-center text-lg font-bold dark:text-white"
        verticalAlignment="center"
      ></Label>
      <StackLayout col="2" (tap)="nextMonth()" class="p-2">
        <Image
          *ngIf="isIOS"
          src="sys://chevron.right"
          tintColor="#3b82f6"
          width="22" height="22"
        ></Image>
        <Label
          *ngIf="!isIOS"
          [text]="nextIcon"
          class="material-icon text-blue-500"
          style="font-size: 22"
        ></Label>
      </StackLayout>
    </GridLayout>

    <!-- Calendar grid -->
    <ScrollView row="3">
      <StackLayout class="mx-4" (swipe)="onCalendarSwipe($event)">
        <GridLayout columns="*, *, *, *, *, *, *"
          [rows]="calendarRowDefs()"
          class="rounded-2xl bg-white dark:bg-[#1c1c1e] p-3"
        >
          <Label row="0" col="0" text="S" class="text-center text-xs font-semibold text-gray-400 dark:text-gray-500" verticalAlignment="center"></Label>
          <Label row="0" col="1" text="M" class="text-center text-xs font-semibold text-gray-400 dark:text-gray-500" verticalAlignment="center"></Label>
          <Label row="0" col="2" text="T" class="text-center text-xs font-semibold text-gray-400 dark:text-gray-500" verticalAlignment="center"></Label>
          <Label row="0" col="3" text="W" class="text-center text-xs font-semibold text-gray-400 dark:text-gray-500" verticalAlignment="center"></Label>
          <Label row="0" col="4" text="T" class="text-center text-xs font-semibold text-gray-400 dark:text-gray-500" verticalAlignment="center"></Label>
          <Label row="0" col="5" text="F" class="text-center text-xs font-semibold text-gray-400 dark:text-gray-500" verticalAlignment="center"></Label>
          <Label row="0" col="6" text="S" class="text-center text-xs font-semibold text-gray-400 dark:text-gray-500" verticalAlignment="center"></Label>

          <Label *ngFor="let cell of flatCalendarCells()"
            [row]="cell.gridRow" [col]="cell.gridCol"
            [text]="cell.dayOfMonth"
            width="36" height="36"
            borderRadius="18"
            [backgroundColor]="getCellColor(cell)"
            [borderColor]="cell.isToday ? '#3b82f6' : 'transparent'"
            borderWidth="2"
            [color]="getCellTextColor(cell)"
            class="text-center text-xs"
            horizontalAlignment="center"
            verticalAlignment="center"
          ></Label>
        </GridLayout>

        <!-- Legend -->
        <StackLayout orientation="horizontal" class="mt-3 mb-4 px-2" horizontalAlignment="center">
          <StackLayout orientation="horizontal" class="mr-4">
            <StackLayout width="10" height="10" borderRadius="5" backgroundColor="#bbf7d0" verticalAlignment="center"></StackLayout>
            <Label text="Prayed" class="text-xs text-gray-400 dark:text-gray-500 ml-1" verticalAlignment="center"></Label>
          </StackLayout>
          <StackLayout orientation="horizontal" class="mr-4">
            <StackLayout width="10" height="10" borderRadius="5" backgroundColor="#16a34a" verticalAlignment="center"></StackLayout>
            <Label text="+ Journal" class="text-xs text-gray-400 dark:text-gray-500 ml-1" verticalAlignment="center"></Label>
          </StackLayout>
          <StackLayout orientation="horizontal">
            <StackLayout width="10" height="10" borderRadius="5" backgroundColor="#ede9fe" verticalAlignment="center"></StackLayout>
            <Label text="Shield" class="text-xs text-gray-400 dark:text-gray-500 ml-1" verticalAlignment="center"></Label>
          </StackLayout>
        </StackLayout>
      </StackLayout>
    </ScrollView>
  }

  <!-- =============== YEAR VIEW =============== -->
  @else {
    <!-- Year navigation -->
    <GridLayout row="2" columns="auto, *, auto" class="mx-4 mb-2 px-2">
      <StackLayout col="0" (tap)="previousYear()" class="p-2">
        <Image
          *ngIf="isIOS"
          src="sys://chevron.left"
          tintColor="#3b82f6"
          width="22" height="22"
        ></Image>
        <Label
          *ngIf="!isIOS"
          [text]="prevIcon"
          class="material-icon text-blue-500"
          style="font-size: 22"
        ></Label>
      </StackLayout>
      <Label col="1"
        [text]="calendarYear()"
        class="text-center text-lg font-bold dark:text-white"
        verticalAlignment="center"
      ></Label>
      <StackLayout col="2" (tap)="nextYear()" class="p-2">
        <Image
          *ngIf="isIOS"
          src="sys://chevron.right"
          tintColor="#3b82f6"
          width="22" height="22"
        ></Image>
        <Label
          *ngIf="!isIOS"
          [text]="nextIcon"
          class="material-icon text-blue-500"
          style="font-size: 22"
        ></Label>
      </StackLayout>
    </GridLayout>

    <!-- Year-at-a-glance grid -->
    <ScrollView row="3" (swipe)="onYearSwipe($event)">
      <StackLayout class="mx-4 mb-4">
        <GridLayout columns="*, *, *" rows="auto, auto, auto, auto"
          class="rounded-2xl bg-white dark:bg-[#1c1c1e] p-3"
        >
          <GridLayout *ngFor="let mm of yearMonths()"
            [row]="mm.gridRow" [col]="mm.gridCol"
            columns="*, *, *, *, *, *, *"
            [rows]="mm.miniRowDefs"
            class="p-2"
            verticalAlignment="top"
            (tap)="selectMonth(mm.monthIndex)"
          >
            <Label row="0" col="0" colSpan="7" [text]="mm.name"
              class="text-center text-sm font-bold dark:text-white"
            ></Label>
            <Label row="1" col="0" text="S" class="text-center text-gray-400 dark:text-gray-600" style="font-size: 7"></Label>
            <Label row="1" col="1" text="M" class="text-center text-gray-400 dark:text-gray-600" style="font-size: 7"></Label>
            <Label row="1" col="2" text="T" class="text-center text-gray-400 dark:text-gray-600" style="font-size: 7"></Label>
            <Label row="1" col="3" text="W" class="text-center text-gray-400 dark:text-gray-600" style="font-size: 7"></Label>
            <Label row="1" col="4" text="T" class="text-center text-gray-400 dark:text-gray-600" style="font-size: 7"></Label>
            <Label row="1" col="5" text="F" class="text-center text-gray-400 dark:text-gray-600" style="font-size: 7"></Label>
            <Label row="1" col="6" text="S" class="text-center text-gray-400 dark:text-gray-600" style="font-size: 7"></Label>

            <Label *ngFor="let cell of mm.flatCells"
              [row]="cell.gridRow" [col]="cell.gridCol"
              text="" width="10" height="10"
              borderRadius="2"
              [backgroundColor]="getMiniCellColor(cell)"
              horizontalAlignment="center"
              verticalAlignment="center"
            ></Label>
          </GridLayout>
        </GridLayout>

        <!-- Legend -->
        <StackLayout orientation="horizontal" class="mt-3 px-2" horizontalAlignment="center">
          <StackLayout orientation="horizontal" class="mr-4">
            <StackLayout width="10" height="10" borderRadius="5" backgroundColor="#86efac" verticalAlignment="center"></StackLayout>
            <Label text="Prayed" class="text-xs text-gray-400 dark:text-gray-500 ml-1" verticalAlignment="center"></Label>
          </StackLayout>
          <StackLayout orientation="horizontal" class="mr-4">
            <StackLayout width="10" height="10" borderRadius="5" backgroundColor="#16a34a" verticalAlignment="center"></StackLayout>
            <Label text="+ Journal" class="text-xs text-gray-400 dark:text-gray-500 ml-1" verticalAlignment="center"></Label>
          </StackLayout>
          <StackLayout orientation="horizontal">
            <StackLayout width="10" height="10" borderRadius="5" backgroundColor="#ede9fe" verticalAlignment="center"></StackLayout>
            <Label text="Shield" class="text-xs text-gray-400 dark:text-gray-500 ml-1" verticalAlignment="center"></Label>
          </StackLayout>
        </StackLayout>
      </StackLayout>
    </ScrollView>
  }
</GridLayout>
